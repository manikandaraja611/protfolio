{% extends "base.html" %}

{% block title %}{% if post %}Edit Post{% else %}New Post{% endif %} - My Blog{% endblock %}

{% block content %}
<section class="edit-post-section">
    <div class="container">
        <h1>{% if post %}Edit Post{% else %}New Post{% endif %}</h1>

        <form method="POST" class="post-form">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="{% if post %}{{ post.title }}{% endif %}" required>
            </div>

            <div class="form-group">
                <label for="excerpt">Excerpt (optional)</label>
                <textarea id="excerpt" name="excerpt" rows="3">{% if post %}{{ post.excerpt }}{% endif %}</textarea>
            </div>

            <div class="form-group">
                <label for="tags">Tags (comma-separated)</label>
                <input type="text" id="tags" name="tags" value="{% if post %}{{ post.tags }}{% endif %}">
            </div>

            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" rows="15" required>{% if post %}{{ post.content }}{% endif %}</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">{% if post %}Update{% else %}Create{% endif %} Post</button>
                <a href="{{ url_for('admin') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}</content>
